<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>pet_taskbar_icosaendro</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      canvas {
        display: block;
        /* Glow externo roxo + âmbar, complementa o emissive do material */
        filter: drop-shadow(0 0 24px rgba(124, 58, 237, 0.35))
                drop-shadow(0 0 52px rgba(217, 119, 6, 0.18));
        transition: filter 0.8s ease;
      }
      /* Modo Excited: o glow esquenta pra rosa e pulsa (liveAnimation.js) */
      canvas.excited-glow {
        animation: excited-throb 0.86s ease-in-out infinite;
      }
      @keyframes excited-throb {
        0%, 100% {
          filter: drop-shadow(0 0 26px rgba(244, 63, 94, 0.5))
                  drop-shadow(0 0 60px rgba(192, 38, 211, 0.28));
        }
        30% {
          filter: drop-shadow(0 0 40px rgba(244, 63, 94, 0.75))
                  drop-shadow(0 0 86px rgba(192, 38, 211, 0.45));
        }
      }
      /* Modo Zen: o glow esfria pra ciano/verde-água e respira devagar,
         no mesmo compasso da zen_breathing (4.6s) — liveAnimation.js */
      canvas.zen-glow {
        animation: zen-breathe 4.6s ease-in-out infinite;
      }
      @keyframes zen-breathe {
        0%, 100% {
          filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.32))
                  drop-shadow(0 0 46px rgba(52, 211, 153, 0.14));
        }
        50% {
          filter: drop-shadow(0 0 34px rgba(34, 211, 238, 0.55))
                  drop-shadow(0 0 72px rgba(52, 211, 153, 0.3));
        }
      }

      /* ── Camadas de UI (z-index) ──────────────────────────────────────
         Todo elemento que segue o gem (liveAnimation.js) tem uma camada
         fixa aqui, pra sobreposição nunca depender da ordem em que cada
         módulo é inicializado. Prioridade crescente (o de cima sempre
         cobre os de baixo):
           10  #zzz, #site-icon, efeitos (effects.js: corações/gotas/blush)
                — decoração ambiente, nunca bloqueia nada
           20  #affection-bar        — medidor de carinho
           30  #speech               — balão de fala comum
           40  #pet-prompt           — balão de PERGUNTA (prompt.js):
                sempre acima da fala comum
           50  #pet-chat             — painel de chat (chat.js): nunca fica
                atrás/embaixo de nenhum outro elemento
         (o #pet-canvas não entra nessa lista: sem `position`, fica em fluxo
         estático e é sempre pintado ANTES de qualquer elemento posicionado
         acima, sem precisar de z-index.)
         Fala comum e painel/pergunta também nunca aparecem juntos: enquanto
         o chat está aberto ou a pergunta na tela, a classe `.suppressed`
         (aplicada em liveAnimation.js) esconde o balão de fala visualmente,
         sem cortar a fila/cooldown de speech.js. */

      /* "z z z" flutuando ao lado do gem enquanto dorme */
      #zzz {
        position: absolute;
        z-index: 10;
        bottom: 64px;
        left: 0; /* movido via JS para acompanhar o gem */
        display: none;
        pointer-events: none;
        font-family: 'Segoe UI', sans-serif;
        font-weight: 600;
        color: #c4b5fd;
        text-shadow: 0 0 8px rgba(124, 58, 237, 0.6);
      }
      #zzz.visible { display: block; }
      #zzz span {
        position: absolute;
        left: 0;
        bottom: 0;
        opacity: 0;
        animation: zfloat 2.4s ease-in-out infinite;
      }
      #zzz span:nth-child(1) { font-size: 12px; animation-delay: 0s;    left: 0;   }
      #zzz span:nth-child(2) { font-size: 17px; animation-delay: 0.55s; left: 10px; }
      #zzz span:nth-child(3) { font-size: 22px; animation-delay: 1.1s;  left: 22px; }
      @keyframes zfloat {
        0%   { opacity: 0;   transform: translateY(-2px); }
        40%  { opacity: 0.9; transform: translateY(-9px); }
        100% { opacity: 0;   transform: translateY(-16px); }
      }

      /* Ico_Eye: ícone flutuando acima do gem conforme o site detectado */
      #site-icon {
        position: absolute;
        z-index: 10;
        bottom: 74px;
        left: 0; /* movido via JS para acompanhar o gem */
        display: none;
        pointer-events: none;
        font-size: 20px;
        transform: translateX(-50%);
        animation: sitebob 2.2s ease-in-out infinite;
        filter: drop-shadow(0 0 6px rgba(0, 0, 0, 0.35));
      }
      #site-icon.visible { display: block; }
      @keyframes sitebob {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50%      { transform: translateX(-50%) translateY(-6px); }
      }

      /* AI_Live: balão de fala acima do gem (agora com wrap — as respostas
         do chat e os avisos de sistema são mais longos que as falas curtas) */
      #speech {
        position: absolute;
        z-index: 30;
        bottom: 78px;
        left: 0; /* movido via JS para acompanhar o gem */
        transform: translateX(-50%) translateY(4px);
        max-width: 240px;
        width: max-content;
        padding: 6px 10px;
        border-radius: 10px;
        background: rgba(20, 14, 32, 0.82);
        border: 1px solid rgba(196, 181, 253, 0.35);
        color: #ede9fe;
        font-family: 'Segoe UI', sans-serif;
        font-size: 12px;
        line-height: 1.3;
        text-align: center;
        white-space: normal;
        word-wrap: break-word;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      #speech.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      /* Prioridade de UI: pergunta ou chat na tela → a fala comum cede o
         canto (liveAnimation.js liga esta classe todo frame). A fila e o
         cooldown de speech.js continuam rodando por baixo — só o desenho
         para; ela reaparece sozinha assim que o outro elemento fecha. */
      #speech.suppressed {
        opacity: 0 !important;
        transform: translateX(-50%) translateY(4px) !important;
      }
    </style>
  </head>
  <body>
    <canvas id="pet-canvas"></canvas>
    <div id="zzz"><span>z</span><span>z</span><span>z</span></div>
    <div id="site-icon"></div>
    <div id="speech"></div>
    <script type="module" src="movement.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Icozinho — Configurações</title>
    <style>
      :root {
        --bg: #140e20;
        --bg2: #1d1530;
        --panel: #241a3a;
        --line: #3a2d55;
        --txt: #ede9fe;
        --muted: #a99fc7;
        --accent: #7C3AED;
        --accent2: #D97706;
        --danger: #f43f5e;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%;
        background: var(--bg); color: var(--txt);
        font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px;
      }
      body { display: flex; flex-direction: column; }
      header {
        padding: 14px 20px 10px; border-bottom: 1px solid var(--line);
      }
      header h1 { margin: 0; font-size: 17px; font-weight: 600; }
      header p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
      .tabs {
        display: flex; gap: 4px; padding: 8px 12px 0; flex-wrap: wrap;
        border-bottom: 1px solid var(--line); background: var(--bg2);
      }
      .tab {
        padding: 8px 14px; border: none; border-radius: 8px 8px 0 0;
        background: transparent; color: var(--muted); cursor: pointer;
        font-size: 13px; font-weight: 500;
      }
      .tab:hover { color: var(--txt); background: rgba(124,58,237,.12); }
      .tab.active { color: var(--txt); background: var(--panel); }
      main { flex: 1; overflow-y: auto; padding: 18px 20px; }
      .pane { display: none; }
      .pane.active { display: block; }
      .pane h2 { font-size: 14px; margin: 0 0 4px; }
      .pane .hint { color: var(--muted); font-size: 12px; margin: 0 0 16px; }
      .field {
        display: flex; align-items: center; justify-content: space-between;
        gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--line);
      }
      .field:last-child { border-bottom: none; }
      .field label { flex: 1; }
      .field label small { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }
      .field input[type='number'], .field input[type='text'] {
        width: 130px; padding: 6px 8px; border-radius: 6px;
        border: 1px solid var(--line); background: var(--bg); color: var(--txt);
      }
      .field input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
      .card {
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 10px; padding: 12px 14px; margin-bottom: 14px;
      }
      .card h3 { margin: 0 0 8px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
      .swatches { display: inline-flex; gap: 3px; margin-left: auto; }
      .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,.3); }
      .badge { font-size: 10px; color: var(--accent2); border: 1px solid var(--accent2);
        border-radius: 4px; padding: 1px 5px; }
      .lines-bank { margin-bottom: 12px; }
      .lines-bank > .bank-name { font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
      .line-item {
        display: flex; align-items: center; gap: 8px; padding: 4px 8px;
        border-radius: 6px; margin-bottom: 3px; font-size: 12.5px;
      }
      .line-item.builtin { color: var(--muted); background: rgba(255,255,255,.03); }
      .line-item.user { background: rgba(124,58,237,.14); }
      .line-item .txt { flex: 1; }
      .line-item .rm {
        border: none; background: transparent; color: var(--danger);
        cursor: pointer; font-size: 14px; padding: 0 4px;
      }
      .add-row { display: flex; gap: 6px; margin-top: 4px; }
      .add-row input { flex: 1; padding: 6px 8px; border-radius: 6px;
        border: 1px solid var(--line); background: var(--bg); color: var(--txt); }
      .add-row button, .pselect {
        padding: 6px 12px; border-radius: 6px; border: 1px solid var(--line);
        background: var(--bg2); color: var(--txt); cursor: pointer;
      }
      footer {
        display: flex; align-items: center; gap: 14px;
        padding: 12px 20px; border-top: 1px solid var(--line); background: var(--bg2);
      }
      #status { color: var(--muted); font-size: 12px; }
      .btn-primary {
        margin-left: auto; padding: 8px 20px; border: none; border-radius: 8px;
        background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
      }
      .btn-primary:hover { background: #8b4ff0; }
      .restart-note { color: var(--accent2); font-size: 11px; margin-top: 2px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Icozinho — Configurações</h1>
      <p>Ajustes do pet. Mudanças de ritmo, animação, interação, personalidade e falas valem na hora; itens de Sistema pedem reiniciar.</p>
    </header>
    <nav class="tabs" id="tabs"></nav>
    <main id="panes"></main>
    <footer>
      <span id="status"></span>
      <button class="btn-primary" id="save">Salvar</button>
    </footer>
    <script type="module" src="settings.js"></script>
  </body>
</html>
